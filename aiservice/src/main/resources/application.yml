server:
  port: 8083
  error:
    include-stacktrace: never

spring:
  application:
    name: aiservice

  data:
    mongodb:
      uri: mongodb://localhost:27017/airecommendationfitness
      database: airecommendationfitness

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: activity-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer

      properties:
        spring.json.trusted.packages: "*"
        spring.json.add.type.headers: false
        spring.json.value.default.type: com.example.aiservice.model.Activity
kafka:
  topic:
    request: activity-events

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  fetch-registry: true
  instance:
    prefer-ip-address: true

gemini:
  api:
    key: ""
    url: ""