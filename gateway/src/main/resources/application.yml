server:
  port: 8080

spring:
  application:
    name: gateway
  logging:
    level:
      org.springframework.cloud.gateway: DEBUG
  cloud:
    gateway:
      global cors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/user-service/**
          filters:
            - StripPrefix=2

        - id: activity-service
          uri: lb://ACTIVITY-SERVICE
          predicates:
            - Path=/api/activity-service/**
          filters:
            - StripPrefix=2

        - id: ai-service
          uri: lb://AISERVICE
          predicates:
            - Path=/api/ai-service/**
          filters:
            - StripPrefix=2

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth-service/**
          filters:
            - StripPrefix=2

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  fetch-registry: true
  instance:
    prefer-ip-address: true